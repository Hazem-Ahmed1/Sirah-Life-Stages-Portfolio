<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-translate="pageTitleTeen">صفحة المراهقة</title>
  <link href="bootstrap/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/teen.css">
  <link rel="stylesheet" href="css/teenloader.css">
</head>
<body>

  <!-- ====== PAGE LOADER ====== -->
  <div id="pageLoader" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;display:flex;justify-content:center;align-items:center;background:#1a1a2e;transition:opacity 0.6s ease;">
    <svg xmlns="http://www.w3.org/2000/svg" height="200px" width="200px" viewBox="0 0 200 200" class="pencil">
      <defs>
        <clipPath id="pencil-eraser">
          <rect height="30" width="30" ry="5" rx="5"></rect>
        </clipPath>
      </defs>
      <circle transform="rotate(-113,100,100)" stroke-linecap="round" stroke-dashoffset="439.82" stroke-dasharray="439.82 439.82" stroke-width="2" stroke="currentColor" fill="none" r="70" class="pencil__stroke"></circle>
      <g transform="translate(100,100)" class="pencil__rotate">
        <g fill="none">
          <circle transform="rotate(-90)" stroke-dashoffset="402" stroke-dasharray="402.12 402.12" stroke-width="30" stroke="hsl(223,90%,50%)" r="64" class="pencil__body1"></circle>
          <circle transform="rotate(-90)" stroke-dashoffset="465" stroke-dasharray="464.96 464.96" stroke-width="10" stroke="hsl(223,90%,60%)" r="74" class="pencil__body2"></circle>
          <circle transform="rotate(-90)" stroke-dashoffset="339" stroke-dasharray="339.29 339.29" stroke-width="10" stroke="hsl(223,90%,40%)" r="54" class="pencil__body3"></circle>
        </g>
        <g transform="rotate(-90) translate(49,0)" class="pencil__eraser">
          <g class="pencil__eraser-skew">
            <rect height="30" width="30" ry="5" rx="5" fill="hsl(223,90%,70%)"></rect>
            <rect clip-path="url(#pencil-eraser)" height="30" width="5" fill="hsl(223,90%,60%)"></rect>
            <rect height="20" width="30" fill="hsl(223,10%,90%)"></rect>
            <rect height="20" width="15" fill="hsl(223,10%,70%)"></rect>
            <rect height="20" width="5" fill="hsl(223,10%,80%)"></rect>
            <rect height="2" width="30" y="6" fill="hsla(223,10%,10%,0.2)"></rect>
            <rect height="2" width="30" y="13" fill="hsla(223,10%,10%,0.2)"></rect>
          </g>
        </g>
        <g transform="rotate(-90) translate(49,-30)" class="pencil__point">
          <polygon points="15 0,30 30,0 30" fill="hsl(33,90%,70%)"></polygon>
          <polygon points="15 0,6 30,0 30" fill="hsl(33,90%,50%)"></polygon>
          <polygon points="15 0,20 10,10 10" fill="hsl(223,10%,10%)"></polygon>
        </g>
      </g>
    </svg>
  </div>

  <!-- ====== TOP NAVBAR ====== -->
  <nav class="top-navbar">
    <div class="container-fluid px-3">
      <div class="navbar-inner">
        <div class="nav-right">
          <a href="index.html" class="nav-btn" data-translate="navEditProfile">
            <i class="fas fa-user-edit"></i> مرحلة الطفولة
          </a>
          <button id="editProfileBtn" class="nav-btn nav-btn-primary active" data-translate="navAttendance">
            <i class="fas fa-shield-alt"></i> مرحلة المراهقة
          </button>
          <a href="adults.html" class="nav-btn" data-translate="navExpenses">
            <i class="fas fa-file-invoice-dollar"></i> مرحلة الشباب و البلوغ
          </a>
          <button class="lang-btn" id="langBtnAr" onclick="toggleLanguage()">ع</button>
          <button class="lang-btn lang-btn-en" id="langBtnEn" onclick="toggleLanguage()">EN</button>
          <a href="pin-login.html" class="nav-btn nav-btn-logout" title="تسجيل الخروج">
            <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
          </a>
        </div>
        <div class="nav-center">
          <span class="color-label" data-translate="colorLabelTeen">ثيمات المراهقين</span>
          <span id="themeDots" style="display:contents"></span>
        </div>
      </div>
    </div>
  </nav>

  <!-- ====== COVER / PROFILE HEADER ====== -->
  <section class="profile-cover">
    <div class="cover-gradient"></div>
    <div class="cover-teen-deco">
      <div class="deco-neon-headphones"><i class="fas fa-headphones-alt"></i></div>
      <div class="deco-neon-bolt"><i class="fas fa-bolt"></i></div>
      <div class="deco-neon-note deco-neon-note-1"><i class="fas fa-music"></i></div>
      <div class="deco-neon-note deco-neon-note-2"><i class="fas fa-music"></i></div>
      <div class="deco-neon-note deco-neon-note-3"><i class="fas fa-music"></i></div>
      <div class="deco-neon-gamepad"><i class="fas fa-gamepad"></i></div>
      <div class="deco-neon-ring deco-neon-ring-1"></div>
      <div class="deco-neon-ring deco-neon-ring-2"></div>
    </div>
    <div class="cover-profile-info">
      <div class="cover-profile-text">
        <p class="cover-bio">انا اسمي</p>
        <h1 class="cover-name" data-translate="profileName">محمد عبدالله</h1>
        <p class="cover-bio">و عمري 18 سنة</p>
        <div class="cover-badges" id="coverBadges">
          <span class="cover-badge" data-translate="badgeTeen">مرحلة المراهقة</span>
        </div>
        <p class="cover-bio" data-translate="profileBioTeen">شاب طموح يسعى لاكتشاف شغفه وبناء مستقبله</p>
      </div>
      <div class="cover-avatar">
        <div class="avatar-circle">
          <i class="fas fa-user avatar-icon"></i>
        </div>
      </div>
    </div>
  </section>

  <!-- ====== STATS BAR ====== -->
  <section class="stats-bar">
    <div class="container">
      <div class="stats-row" id="statsRow"></div>
    </div>
  </section>

  <!-- ====== TAB NAVIGATION ====== -->
  <section class="tab-navigation">
    <div class="container">
      <ul class="profile-tabs" id="profileTabs"></ul>
    </div>
  </section>

  <!-- ====== MAIN CONTENT ====== -->
  <section class="main-content">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="tab-panels">
            <div class="tab-panel active" id="tab-home"></div>
            <div class="tab-panel" id="tab-birth"></div>
            <div class="tab-panel" id="tab-height"></div>
            <div class="tab-panel" id="tab-certificates"></div>
            <div class="tab-panel" id="tab-education"></div>
            <div class="tab-panel" id="tab-info"></div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="sidebar-card mb-4 scroll-reveal-right">
            <div class="sidebar-header">
              <h5><i class="fas fa-user"></i> <span data-translate="sidebarQuickInfo">نبذة سريعة</span></h5>
            </div>
            <div class="sidebar-body" id="sidebarQuickInfo"></div>
          </div>
          <div class="sidebar-card scroll-reveal-right">
            <div class="sidebar-header">
              <h5><i class="fas fa-book-open"></i> <span>كتاب الحياة</span></h5>
              <a href="#" class="view-all-link" id="openLifeBook">عرض كتاب الحياة</a>
            </div>
            <div class="sidebar-body">
              <div class="photo-grid" id="sidebarPhotoGrid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Video Modal -->
  <div class="cert-video-modal" id="certVideoModal">
    <div class="cert-video-overlay"></div>
    <div class="cert-video-container">
      <button class="cert-video-close" id="certVideoClose"><i class="fas fa-times"></i></button>
      <video id="certVideoPlayer" controls playsinline style="width:100%;border-radius:14px;max-height:80vh;"></video>
    </div>
  </div>

  <!-- Picture Frame Modal -->
  <div class="picture-frame-modal" id="pictureFrameModal">
    <div class="picture-frame-modal-overlay"></div>
    <div class="picture-frame-modal-container">
      <button class="picture-frame-close" id="pictureFrameClose"><i class="fas fa-times"></i></button>
      <button class="frame-nav frame-nav-prev" id="framePrev"><i class="fas fa-chevron-right"></i></button>
      <button class="frame-nav frame-nav-next" id="frameNext"><i class="fas fa-chevron-left"></i></button>
      <div class="frame-counter" id="frameCounter" style="display:none;"><span id="frameCurrentIdx">1</span> / <span id="frameTotalIdx">1</span></div>
      <div class="picture-frame-display">
        <div class="picture-frame-inner">
          <img src="" alt="" id="pictureFrameImg">
        </div>
        <div class="picture-frame-label" id="pictureFrameLabel"></div>
      </div>
      <div class="picture-frame-info" id="pictureFrameInfo" style="display:none;">
        <div class="frame-info-row" id="frameInfoTab"></div>
        <div class="frame-info-row" id="frameInfoDate"></div>
        <div class="frame-info-row" id="frameInfoStats"></div>
      </div>
    </div>
  </div>

  <!-- Book Carousel Modal -->
  <div class="book-carousel-modal" id="bookCarouselModal">
    <div class="book-carousel-overlay"></div>
    <div class="book-carousel-container">
      <button class="book-carousel-close" id="bookCarouselClose"><i class="fas fa-times"></i></button>
      <div class="book-carousel-counter"><span id="bookCurrentIdx">1</span> / <span id="bookTotalIdx">9</span></div>
      <div class="book-year-label" id="bookYearLabel">2019</div>
      <button class="book-nav book-nav-prev" id="bookPrev"><i class="fas fa-chevron-right"></i></button>
      <button class="book-nav book-nav-next" id="bookNext"><i class="fas fa-chevron-left"></i></button>
      <div class="book-carousel-book">
        <div class="book-page book-page-left" id="bookPageLeft"><img src="" alt=""></div>
        <div class="book-spine"></div>
        <div class="book-page book-page-right book-info-page" id="bookPageRight">
          <div class="book-info-content" id="bookInfoContent">
            <div class="book-info-source" id="bookInfoSource"><i class="fas fa-baby"></i> الولادة</div>
            <h4 class="book-info-title" id="bookInfoTitle"></h4>
            <div class="book-info-date" id="bookInfoDate"></div>
            <div class="book-info-meta" id="bookInfoMeta"></div>
          </div>
        </div>
        <div class="book-page-flip" id="bookPageFlip">
          <div class="book-flip-front"><img src="" alt=""></div>
          <div class="book-flip-back"><img src="" alt=""></div>
        </div>
      </div>
      <div class="book-thumbs-carousel">
        <button class="book-thumbs-nav book-thumbs-prev" id="bookThumbsPrev"><i class="fas fa-chevron-right"></i></button>
        <div class="book-thumbs-viewport" id="bookThumbsViewport">
          <div class="book-carousel-thumbs" id="bookThumbs"></div>
        </div>
        <button class="book-thumbs-nav book-thumbs-next" id="bookThumbsNext"><i class="fas fa-chevron-left"></i></button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/teen/data.js"></script>
  <script src="js/shared/renderers.js"></script>
  <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="js/teen/main.js"></script>
  <script src="js/shared/interactions.js"></script>
  <script src="js/shared/book.js"></script>
  <script src="js/shared/translation.js"></script>
  <script src="js/shared/scrollAnimations.js"></script>
  <script>
  window.addEventListener('load', function() {
    var loader = document.getElementById('pageLoader');
    if (!loader) return;
    setTimeout(function() {
      loader.style.opacity = '0';
      setTimeout(function() { loader.remove(); }, 600);
    }, 800);
  });
  </script>

</body>
</html>
